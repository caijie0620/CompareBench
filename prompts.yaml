TallyBench:
  base_prompt: |
    This is an object counting task from TallyBench.
    Follow these rules strictly:
    - Count all clearly identifiable and distinct instances of the target category, including both physical objects and visual representations like drawings or prints, as well as objects that are partially occluded, cropped, or blurred as long as they are clearly recognizable to a human observer.
    - Do not count reflections in mirrors, water, glass, or other reflective surfaces.
    Answer with a single, precise integer only (e.g., 1, 7, 10, or 120). Nothing else. No text. No explanation. No thinking outputs.

CompareTallyBench:
  base_prompt: |
    This is a counting comparison task from the CompareBench.
    Among the four sub-images labeled (A), (B), (C), and (D) arranged in a 2x2 grid, identify which sub-image contains the most or fewest instances of the specified target category, as asked by the question.
    Follow these rules strictly:
    - Count all clearly identifiable and distinct instances of the target category, including both physical objects and visual representations like drawings or prints, as well as objects that are partially occluded, cropped, or blurred as long as they are clearly recognizable to a human observer.
    - Do not count reflections in mirrors, water, glass, or other reflective surfaces.
    - Some sub-images may have been resized, causing aspect ratio distortion, so please recognize and account for this when reasoning.
    Answer with a single, precise letter only (e.g., A, B, C, or D). Nothing else. No text. No explanation. No thinking outputs.

CompareGeometryBench:
  base_prompt: |
    This is a visual comparison task from the CompareBench.
    Follow these rules strictly:
    - The four target objects are each marked with a colored dot labeled A, B, C, or D. Only consider these four marked objects and ignore all other objects in the image.
    - Use the position of the colored dot to identify each target object, not the position of its letter label.
    - Base the judgment solely on the visible geometry of the marked objects, regardless of texture, shading, or semantic category.
    Answer with a single, precise letter only (e.g., A, B, C, or D). Nothing else. No text. No explanation. No thinking outputs.

CompareSpatialBench:
  base_prompt: |
    This is a visual comparison task from the CompareBench.
    Please carefully compare the specified spatial property (vertical height above ground or distance to the camera) between the four color-marked target objects/points in the image.
    Follow these rules strictly:
    - Only consider the points/objects that have visible colored dots on them. Ignore all other locations.
    - Use the position of the colored dot to identify each target point or object, not the position of its letter label.
    - A marked location may represent a physical object or just a point in space (e.g., in the sky, on the ground, or on the ocean).
    - If a marked dot is on an object, compare the required spatial property for that object as a whole.
    Answer with a single, precise letter only (e.g., A, B, C, or D). Nothing else. No text. No explanation. No thinking outputs.

CompareTemporalBench:
  base_prompt: |
    This is a temporal comparison task from the CompareBench, combining visual recognition and background knowledge.
    The four sub-images labeled (A), (B), (C), and (D) arranged in a 2x2 grid may show historical scenes/events, public figures, or landmarks/buildings.
    Follow these rules strictly:
    - First, identify what each sub-image shows using visual cues such as clothing, architecture, technology, scene context, facial identity, or landmark appearance.
    - Then, use the relevant temporal knowledge to answer the question: event or era dates for historical scenes, birth dates for public figures, and original construction/completion dates for landmarks.
    - If a landmark has been renovated or reconstructed, use its original first construction/completion date, not the renovation date.
    - Some sub-images may have been resized, causing aspect ratio distortion, so please recognize and account for this when identifying the scene, person, or landmark.
    Answer with a single, precise letter only (e.g., A, B, C, or D). Nothing else. No text. No explanation. No thinking outputs.
